name: Build

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build Linux binaries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install eBPF build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang bpftool make

      - name: Build eBPF object
        run: make ebpf

      - name: Build binaries
        run: |
          mkdir -p build dist
          make all

      - name: Package binaries
        run: |
          set -euo pipefail
          for target in linux_amd64 linux_arm64; do
            package="beap_${target}"
            mkdir -p "dist/packages/${package}"
            cp "build/${package}" "dist/${package}"
            cp "build/${package}" "dist/packages/${package}/beap"
            cp LICENSE README.md "dist/packages/${package}/"
            tar -C dist/packages -czf "dist/${package}.tar.gz" "${package}"
          done
          cd dist
          sha256sum beap_linux_* *.tar.gz > SHA256SUMS

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beap-linux-binaries
          path: |
            dist/beap_linux_amd64
            dist/beap_linux_arm64
            dist/*.tar.gz
            dist/SHA256SUMS
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/beap_linux_amd64
            dist/beap_linux_arm64
            dist/*.tar.gz
            dist/SHA256SUMS
